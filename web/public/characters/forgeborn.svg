<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE0D2"/>
      <stop offset="100%" stop-color="#E2A78F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#1a1a2e"/>

  <!-- CHARACTER -->
  <g filter="url(#shadow)">
    <rect x="80" y="110" width="80" height="90" rx="20" fill="#E65100"/>
    <rect x="85" y="180" width="25" height="50" rx="10" fill="#3E2723"/>
    <rect x="130" y="180" width="25" height="50" rx="10" fill="#3E2723"/>
    <circle cx="120" cy="70" r="55" fill="url(#skin)"/>
    <circle cx="100" cy="75" r="9" fill="#212121"/>
    <circle cx="140" cy="75" r="9" fill="#212121"/>
    <path d="M 95 110 L 145 110 L 135 180 L 105 180 Z" fill="#5D4037"/>
    <path d="M 80 80 Q 120 120 160 80 Z" fill="#FF8F00"/>
    <rect x="165" y="85" width="12" height="100" fill="#3E2723" transform="rotate(15 165 85)"/>
    <rect x="178" y="90" width="50" height="30" rx="5" fill="#78909C" transform="rotate(15 165 85)"/>
    <circle cx="200" cy="108" r="6" fill="#FF9800" filter="url(#glow)"/>
  </g>

  <!-- Name -->
  <text x="120" y="268" font-family="sans-serif" font-size="18" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Forgeborn</text>
</svg>