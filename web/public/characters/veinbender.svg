<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE0D2"/>
      <stop offset="100%" stop-color="#E2A78F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#1a1a2e"/>

  <!-- CHARACTER -->
  <g filter="url(#shadow)">
    <rect x="80" y="110" width="80" height="100" rx="20" fill="#00695C"/>
    <rect x="85" y="185" width="25" height="50" rx="10" fill="#004D40"/>
    <rect x="130" y="185" width="25" height="50" rx="10" fill="#004D40"/>
    <circle cx="120" cy="70" r="55" fill="url(#skin)"/>
    <circle cx="100" cy="75" r="9" fill="#212121"/>
    <circle cx="140" cy="75" r="9" fill="#212121"/>
    <path d="M 70 45 Q 120 0 170 45 L 175 85 L 65 85 Z" fill="#004D40"/>
    <g transform="translate(160, 135)">
      <path d="M 6 -15 L 18 -15 L 15 0 L 25 20 L 0 20 L 10 0 Z" fill="#B2EBF2" opacity="0.8"/>
      <path d="M 2 18 L 23 18 L 18 6 L 7 6 Z" fill="#00E676" filter="url(#glow)"/>
    </g>
  </g>

  <!-- Name -->
  <text x="120" y="268" font-family="sans-serif" font-size="18" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Veinbender</text>
</svg>