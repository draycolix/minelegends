<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE0D2"/>
      <stop offset="100%" stop-color="#E2A78F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#1a1a2e"/>

  <!-- CHARACTER -->
  <g filter="url(#shadow)">
    <rect x="80" y="110" width="80" height="90" rx="20" fill="#311B92"/>
    <rect x="85" y="180" width="25" height="50" rx="10" fill="#1A237E"/>
    <rect x="130" y="180" width="25" height="50" rx="10" fill="#1A237E"/>
    <circle cx="120" cy="70" r="55" fill="url(#skin)"/>
    <circle cx="100" cy="75" r="9" fill="#212121"/>
    <circle cx="140" cy="75" r="9" fill="#212121"/>
    <path d="M 55 70 Q 120 -10 185 70 L 170 115 L 70 115 Z" fill="#1A237E" opacity="0.95"/>
    <g transform="translate(170, 135) rotate(-45)">
      <rect x="-4" y="0" width="8" height="25" fill="#424242"/>
      <path d="M -6 0 L 0 -45 L 6 0 Z" fill="#9C27B0" filter="url(#glow)"/>
    </g>
  </g>

  <!-- Name -->
  <text x="120" y="268" font-family="sans-serif" font-size="18" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Shadowvein</text>
</svg>