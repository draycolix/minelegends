<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE0D2"/>
      <stop offset="100%" stop-color="#E2A78F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #E0E0E0; text-anchor: middle; }
    .bg { fill: #1E1E1E; }
  </style>
  
  <rect width="100%" height="100%" class="bg"/>

  <!-- 1. Delver (Miner) -->
  <g transform="translate(50, 20)" filter="url(#shadow)">
    <text x="100" y="270" class="title">Delver</text>
    <rect x="70" y="120" width="60" height="70" rx="20" fill="#6B705C"/>
    <rect x="75" y="180" width="20" height="40" rx="10" fill="#37474F"/>
    <rect x="105" y="180" width="20" height="40" rx="10" fill="#37474F"/>
    <circle cx="100" cy="80" r="45" fill="url(#skin)"/>
    <circle cx="85" cy="85" r="7" fill="#212121"/>
    <circle cx="115" cy="85" r="7" fill="#212121"/>
    <path d="M 50 75 A 50 50 0 0 1 150 75 Z" fill="#B0BEC5"/>
    <circle cx="100" cy="55" r="12" fill="#FFC107" filter="url(#glow)"/>
    <rect x="130" y="100" width="8" height="90" fill="#5D4037" transform="rotate(-15 130 100)"/>
    <path d="M 90 95 Q 140 70 180 110 L 170 120 Q 140 90 100 110 Z" fill="#00E5FF" filter="url(#glow)"/>
  </g>

  <!-- 2. Ironblood (Warrior) -->
  <g transform="translate(350, 20)" filter="url(#shadow)">
    <text x="100" y="270" class="title">Ironblood</text>
    <rect x="70" y="120" width="60" height="70" rx="20" fill="#B71C1C"/>
    <rect x="75" y="180" width="20" height="40" rx="10" fill="#212121"/>
    <rect x="105" y="180" width="20" height="40" rx="10" fill="#212121"/>
    <circle cx="100" cy="80" r="45" fill="url(#skin)"/>
    <circle cx="85" cy="85" r="7" fill="#212121"/>
    <circle cx="115" cy="85" r="7" fill="#212121"/>
    <path d="M 55 60 Q 100 20 145 60 L 150 70 L 50 70 Z" fill="#424242"/>
    <rect x="52" y="65" width="96" height="15" fill="#D32F2F"/>
    <g transform="translate(135, 120) rotate(30)">
      <rect x="-5" y="0" width="10" height="30" fill="#795548"/>
      <rect x="-10" y="-10" width="20" height="10" fill="#FFC107"/>
      <path d="M -8 -10 L 0 -70 L 8 -10 Z" fill="#ECEFF1"/>
    </g>
    <g transform="translate(55, 110) rotate(-30)">
      <rect x="-5" y="0" width="10" height="30" fill="#795548"/>
      <rect x="-10" y="-10" width="20" height="10" fill="#FFC107"/>
      <path d="M -8 -10 L 0 -70 L 8 -10 Z" fill="#ECEFF1"/>
    </g>
  </g>

  <!-- 3. Forgeborn (Blacksmith) -->
  <g transform="translate(650, 20)" filter="url(#shadow)">
    <text x="100" y="270" class="title">Forgeborn</text>
    <rect x="70" y="120" width="60" height="70" rx="20" fill="#E65100"/>
    <rect x="75" y="180" width="20" height="40" rx="10" fill="#3E2723"/>
    <rect x="105" y="180" width="20" height="40" rx="10" fill="#3E2723"/>
    <circle cx="100" cy="80" r="45" fill="url(#skin)"/>
    <circle cx="85" cy="85" r="7" fill="#212121"/>
    <circle cx="115" cy="85" r="7" fill="#212121"/>
    <path d="M 80 120 L 120 120 L 110 180 L 90 180 Z" fill="#5D4037"/>
    <path d="M 70 95 Q 100 130 130 95 Z" fill="#FF8F00"/>
    <rect x="135" y="100" width="10" height="80" fill="#3E2723" transform="rotate(15 135 100)"/>
    <rect x="145" y="105" width="40" height="25" rx="5" fill="#78909C" transform="rotate(15 135 100)"/>
    <circle cx="165" cy="117" r="5" fill="#FF9800" filter="url(#glow)"/>
  </g>

  <!-- 4. Shadowvein (Rogue) -->
  <g transform="translate(50, 320)" filter="url(#shadow)">
    <text x="100" y="270" class="title">Shadowvein</text>
    <rect x="70" y="120" width="60" height="70" rx="20" fill="#311B92"/>
    <rect x="75" y="180" width="20" height="40" rx="10" fill="#1A237E"/>
    <rect x="105" y="180" width="20" height="40" rx="10" fill="#1A237E"/>
    <circle cx="100" cy="80" r="45" fill="url(#skin)"/>
    <circle cx="85" cy="85" r="7" fill="#212121"/>
    <circle cx="115" cy="85" r="7" fill="#212121"/>
    <path d="M 50 80 Q 100 10 150 80 L 140 120 L 60 120 Z" fill="#1A237E" opacity="0.95"/>
    <g transform="translate(140, 140) rotate(-45)">
      <rect x="-3" y="0" width="6" height="20" fill="#424242"/>
      <path d="M -5 0 L 0 -30 L 5 0 Z" fill="#9C27B0" filter="url(#glow)"/>
    </g>
  </g>

  <!-- 5. Stonewarden (Knight) -->
  <g transform="translate(350, 320)" filter="url(#shadow)">
    <text x="100" y="270" class="title">Stonewarden</text>
    <rect x="60" y="115" width="80" height="75" rx="15" fill="#546E7A"/>
    <rect x="75" y="180" width="25" height="40" rx="5" fill="#37474F"/>
    <rect x="100" y="180" width="25" height="40" rx="5" fill="#37474F"/>
    <circle cx="100" cy="80" r="45" fill="url(#skin)"/>
    <circle cx="85" cy="85" r="7" fill="#212121"/>
    <circle cx="115" cy="85" r="7" fill="#212121"/>
    <path d="M 50 70 L 150 70 L 140 110 L 60 110 Z" fill="#455A64"/>
    <path d="M 120 120 L 160 120 L 160 160 Q 140 190 120 160 Z" fill="#78909C"/>
    <circle cx="140" cy="140" r="10" fill="#00BCD4" filter="url(#glow)"/>
  </g>

  <!-- 6. Veinbender (Alchemist) -->
  <g transform="translate(650, 320)" filter="url(#shadow)">
    <text x="100" y="270" class="title">Veinbender</text>
    <rect x="70" y="120" width="60" height="80" rx="20" fill="#00695C"/>
    <rect x="75" y="180" width="20" height="40" rx="10" fill="#004D40"/>
    <rect x="105" y="180" width="20" height="40" rx="10" fill="#004D40"/>
    <circle cx="100" cy="80" r="45" fill="url(#skin)"/>
    <circle cx="85" cy="85" r="7" fill="#212121"/>
    <circle cx="115" cy="85" r="7" fill="#212121"/>
    <path d="M 60 60 Q 100 20 140 60 L 145 90 L 55 90 Z" fill="#004D40"/>
    <g transform="translate(130, 140)">
      <path d="M 5 -10 L 15 -10 L 12 0 L 20 15 L 0 15 L 8 0 Z" fill="#B2EBF2" opacity="0.8"/>
      <path d="M 2 13 L 18 13 L 14 5 L 6 5 Z" fill="#00E676" filter="url(#glow)"/>
    </g>
  </g>
</svg>
