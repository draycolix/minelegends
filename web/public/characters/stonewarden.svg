<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE0D2"/>
      <stop offset="100%" stop-color="#E2A78F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#1a1a2e"/>

  <!-- CHARACTER -->
  <g filter="url(#shadow)">
    <rect x="70" y="105" width="100" height="95" rx="15" fill="#546E7A"/>
    <rect x="85" y="180" width="30" height="50" rx="5" fill="#37474F"/>
    <rect x="125" y="180" width="30" height="50" rx="5" fill="#37474F"/>
    <circle cx="120" cy="70" r="55" fill="url(#skin)"/>
    <circle cx="100" cy="75" r="9" fill="#212121"/>
    <circle cx="140" cy="75" r="9" fill="#212121"/>
    <path d="M 60 60 L 180 60 L 165 105 L 75 105 Z" fill="#455A64"/>
    <path d="M 150 110 L 200 110 L 200 155 Q 175 195 150 155 Z" fill="#78909C"/>
    <circle cx="175" cy="135" r="12" fill="#00BCD4" filter="url(#glow)"/>
  </g>

  <!-- Name -->
  <text x="120" y="268" font-family="sans-serif" font-size="18" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Stonewarden</text>
</svg>